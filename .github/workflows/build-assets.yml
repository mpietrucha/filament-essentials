name: Build Assets

on:
  push:
    branches: [main]
    paths:
      - 'resources/js/**'
      - 'resources/bin/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/dist/
          git diff --staged --quiet || (git commit -m "chore: build assets" && git push)
